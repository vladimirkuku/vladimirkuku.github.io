<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test</title>
  <style>
    body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f0f0f0; }
    #login, #content { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; }
    input { padding: 0.5rem 1rem; font-size: 1rem; margin-right: 0.5rem; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 0.5rem 1rem; font-size: 1rem; cursor: pointer; background: #333; color: white; border: none; border-radius: 4px; }
    #error { color: red; margin-top: 0.5rem; font-size: 0.9rem; }
    #content { display: none; }
  </style>
</head>
<body>
  <div id="login">
    <h2>Enter Password</h2>
    <input type="password" id="pwd" placeholder="Password" onkeydown="if(event.key==='Enter')check()">
    <button onclick="check()">Enter</button>
    <div id="error"></div>
  </div>
  <div id="content">
    <h1>test</h1>
  </div>
  <script>
    function check() {
      const hash = "b5c90b1b5262e2b20198df56cf6a5c4b3a16fc4f5b62e6b72e69a98cf7f77b91";
      const input = document.getElementById("pwd").value;
      crypto.subtle.digest("SHA-256", new TextEncoder().encode(input)).then(buf => {
        const hex = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
        if (hex === hash) {
          document.getElementById("login").style.display = "none";
          document.getElementById("content").style.display = "block";
        } else {
          document.getElementById("error").textContent = "Wrong password";
        }
      });
    }
  </script>
</body>
</html>
